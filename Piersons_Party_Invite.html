<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pierson's Polish Party</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Playfair+Display:ital,wght@0,700;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(135deg, #dce8f8 0%, #e8dff5 50%, #f5e6f0 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    font-family: 'Lato', sans-serif;
  }

  .card {
    width: 500px;
    background: #fff;
    position: relative;
    overflow: hidden;
    border-radius: 6px;
    box-shadow: 0 20px 60px rgba(100,120,200,0.2), 0 4px 16px rgba(0,0,0,0.07);
    animation: appear 0.8s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes appear {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── HERO PHOTO ───────────────────────────────── */
  .hero {
    position: relative;
    height: 280px;
    overflow: hidden;
  }
  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
    display: block;
  }
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(255,255,255,0) 25%,
      rgba(255,255,255,0.25) 60%,
      rgba(255,255,255,1) 100%
    );
  }

  /* ── TITLE BLOCK ──────────────────────────────── */
  .title-block {
    position: relative;
    text-align: center;
    padding: 0 40px;
    margin-top: -18px;
    z-index: 2;
  }
  .you-are-invited {
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #8899dd;
    display: block;
    margin-bottom: 10px;
    animation: riseIn 0.6s 0.2s both;
  }

  /* Pacifico for the fun name */
  .name {
    font-family: 'Pacifico', cursive;
    font-size: 52px;
    line-height: 1.05;
    color: #5b72c4;
    display: block;
    animation: riseIn 0.6s 0.3s both;
  }
  .name .polish {
    color: #b07ec8;
    font-size: 46px;
  }

  .party-sub {
    font-family: 'Lato', sans-serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #9aabdc;
    display: block;
    margin-top: 10px;
    animation: riseIn 0.6s 0.4s both;
  }
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── DIVIDER ──────────────────────────────────── */
  .rule {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, #8faee8, #b07ec8, #e8a0c0);
    margin: 22px auto;
    border-radius: 2px;
    animation: riseIn 0.6s 0.45s both;
  }

  /* ── DETAILS GRID ─────────────────────────────── */
  .details {
    padding: 0 48px 32px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px 16px;
    animation: riseIn 0.6s 0.5s both;
  }
  .detail { text-align: center; }
  .detail-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #8899dd;
    font-weight: 700;
    display: block;
    margin-bottom: 5px;
  }
  .detail-value {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: #3d4f8a;
    line-height: 1.35;
    display: block;
  }
  .detail-note {
    font-size: 12px;
    color: #7788bb;
    font-weight: 400;
    display: block;
    margin-top: 3px;
    letter-spacing: 0.3px;
  }
  .detail.full { grid-column: 1 / -1; }

  /* ── ACTIVITIES STRIP ─────────────────────────── */
  .activities {
    background: linear-gradient(135deg, #e8eef8, #ece5f5);
    padding: 17px 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    animation: riseIn 0.6s 0.55s both;
  }
  .act {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #7b6bb5;
    font-weight: 700;
  }
  .dot-sep {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: linear-gradient(135deg, #8faee8, #cc96d4);
    margin: 0 14px;
    flex-shrink: 0;
  }

  /* ── RSVP FOOTER ──────────────────────────────── */
  .rsvp-footer {
    background: linear-gradient(135deg, #7b9fe0 0%, #9b7ec8 60%, #cc8ab0 100%);
    padding: 28px 40px 32px;
    text-align: center;
    animation: riseIn 0.6s 0.6s both;
  }
  .rsvp-heading {
    font-family: 'Lato', sans-serif;
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    font-weight: 700;
    display: block;
    margin-bottom: 14px;
  }
  .rsvp-link {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: #fff;
    text-decoration: none;
    line-height: 1.9;
    font-weight: 700;
    transition: opacity 0.15s;
  }
  .rsvp-link:hover { opacity: 0.75; text-decoration: underline; }

  /* ── ADD TO CALENDAR BUTTON ───────────────────── */
  .cal-btn {
    display: inline-block;
    margin-top: 18px;
    background: #fff;
    color: #5b72c4;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    text-decoration: none;
    padding: 12px 28px;
    border-radius: 100px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .cal-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  }

  @media print {
    body { background: white; padding: 0; }
    .card { box-shadow: none; width: 100%; animation: none; border-radius: 0; }
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
